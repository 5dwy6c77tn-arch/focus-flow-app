<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus Session</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#202020">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Focus">
    
    <!-- Embedded Web App Manifest for "Add to Home Screen" -->
    <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22Focus%20Session%22%2C%22short_name%22%3A%22Focus%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23202020%22%2C%22theme_color%22%3A%22%23202020%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22https%3A%2F%2Fcdn-icons-png.flaticon.com%2F512%2F2059%2F2059738.png%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fpng%22%7D%2C%7B%22src%22%3A%22https%3A%2F%2Fcdn-icons-png.flaticon.com%2F512%2F2059%2F2059738.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #202020;
            --card-bg: #2b2b2b;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent-color: #60cdff;
            --accent-hover: #50b0db;
            --success-color: #107c10;
            --success-bg: #107c10;
            --border-radius: 16px; 
            --input-bg: #353535;
            --border-color: #444;
            --font-family: 'Segoe UI', sans-serif;
            --shadow: 0 8px 24px rgba(0,0,0,0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

        .app-container {
            display: flex;
            gap: 20px;
            max-width: 900px;
            width: 100%;
            height: 100%;
            align-items: stretch;
        }

        .col-left, .col-right {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
            min-width: 0;
        }

        /* --- Mobile Optimization --- */
        @media (max-width: 850px) {
            body { 
                padding: 15px; 
                align-items: flex-start; 
                height: auto;
            }
            .app-container { flex-direction: column; gap: 15px; }
            .col-left, .col-right { width: 100%; gap: 15px; }
            .card { padding: 20px; }
        }

        /* --- Cards Generic --- */
        .card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 24px;
            position: relative;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 15px;
            z-index: 10;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
            margin-left: 12px;
            padding: 6px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .icon-btn:hover { color: var(--text-primary); background-color: rgba(255,255,255,0.05); }

        /* Install App Pulse Animation */
        .install-pulse {
            color: var(--accent-color) !important;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* --- Focus Card --- */
        .focus-main { min-height: 420px; display: flex; flex-direction: column; }
        .setup-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .setup-content-wrapper { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .setup-view p { color: var(--text-secondary); font-size: 14px; margin-bottom: 30px; line-height: 1.5; max-width: 80%; }
        
        .time-picker {
            background-color: var(--input-bg); border-radius: 12px; display: flex; align-items: center; padding: 15px 25px; margin-bottom: 40px; border: 1px solid var(--border-color);
            transition: border-color 0.2s;
        }
        .time-picker:focus-within { border-color: var(--accent-color); }
        
        .time-input {
            background: transparent; border: none; color: var(--text-primary); font-size: 42px; font-weight: 300; width: 90px; text-align: right; margin-right: 15px; font-family: inherit;
        }
        
        .time-unit { font-size: 14px; color: var(--text-secondary); display: flex; flex-direction: column; align-items: flex-start; }
        .spin-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 14px; padding: 4px; transition: color 0.2s;}
        .spin-btn:hover { color: var(--text-primary); }

        .btn-primary {
            background-color: var(--accent-color); color: #000; border: none; border-radius: 8px; padding: 12px 35px; font-weight: 600; font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.2s, transform 0.1s;
        }
        .btn-primary:hover { background-color: var(--accent-hover); }
        .btn-primary:active { transform: scale(0.98); }

        .timer-view { display: none; flex: 1; flex-direction: column; justify-content: center; align-items: center; }
        .progress-ring-container { position: relative; width: 220px; height: 220px; margin-bottom: 30px; }
        .progress-ring { transform: rotate(-90deg); transform-origin: 50% 50%; }
        .progress-ring__circle { stroke: var(--accent-color); stroke-dasharray: 628; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; stroke-linecap: round; }
        .progress-ring__circle-bg { stroke: #3a3a3a; }
        .timer-center-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .timer-big-text { font-size: 48px; font-weight: 400; }
        
        .stop-btn { 
            width: 50px; height: 50px; border-radius: 14px; background-color: var(--accent-color); border: none; color: #000; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 20px; 
            box-shadow: 0 4px 15px rgba(96, 205, 255, 0.3); transition: transform 0.1s;
        }
        .stop-btn:active { transform: scale(0.95); }

        /* --- Input Generic --- */
        .task-input-container { display: none; gap: 10px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); animation: slideDown 0.2s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .task-input { flex: 1; background-color: var(--input-bg); border: 1px solid var(--border-color); color: white; padding: 10px 14px; border-radius: 8px; font-size: 14px; transition: border-color 0.2s; }
        .task-input:focus { border-color: var(--accent-color); }
        .add-task-btn { background-color: #3a3a3a; color: white; border: 1px solid var(--border-color); border-radius: 8px; padding: 0 14px; cursor: pointer; transition: background 0.2s; }
        .add-task-btn:hover { background-color: #444; }

        /* --- Tasks Card --- */
        .tasks-card { min-height: 350px; display: flex; flex-direction: column; }
        .task-list { list-style: none; overflow-y: auto; flex: 1; max-height: 250px; padding-right: 5px; margin-top: 10px;}
        .task-item { 
            border: 2px solid transparent; background-color: #353535; border-radius: 10px; padding: 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.2s; margin-bottom: 10px; 
        }
        .task-item:hover { background-color: #3e3e3e; }
        .task-item.selected { border-color: var(--accent-color); background-color: rgba(96, 205, 255, 0.05); }
        .task-item.completed { opacity: 0.6; }
        .task-item.completed h4 { text-decoration: line-through; }
        
        .task-checkbox-area { display: flex; align-items: center; justify-content: center; z-index: 2; padding: 5px; }
        .custom-checkbox { width: 22px; height: 22px; border: 2px solid var(--text-secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .task-item.completed .custom-checkbox { background-color: var(--success-bg); border-color: var(--success-bg); }
        .custom-checkbox i { font-size: 12px; color: white; display: none; }
        .task-item.completed .custom-checkbox i { display: block; }
        
        .task-info { flex: 1; }
        .task-info h4 { font-weight: 400; font-size: 15px; margin-bottom: 4px; }
        .task-info span { font-size: 12px; color: var(--text-secondary); }
        .task-time-spent { font-size: 13px; color: var(--accent-color); font-weight: 600; margin-right: 10px; min-width: 35px; text-align: right; }
        .delete-task-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 14px; padding: 8px; transition: color 0.2s; }
        .delete-task-btn:hover { color: #ff6060; }

        /* --- Habits Card --- */
        .habits-card { min-height: 350px; display: flex; flex-direction: column; flex: 1; }
        .habits-list { list-style: none; margin-bottom: 20px; overflow-y: auto; flex: 1; min-height: 120px; padding-right: 5px; margin-top: 10px;}
        .habit-item { 
            display: flex; align-items: center; gap: 10px; padding: 12px; background-color: #353535; margin-bottom: 8px; border-radius: 10px; transition: background 0.2s;
        }
        .habit-item:hover { background-color: #3e3e3e; }
        .habit-text { font-size: 14px; flex: 1; }
        
        /* Bar Graph */
        .chart-container { margin-top: auto; padding-top: 15px; border-top: 1px solid #3a3a3a; }
        .chart-title { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; }
        .bar-chart { display: flex; justify-content: space-between; align-items: flex-end; height: 100px; gap: 6px; }
        .chart-col { display: flex; flex-direction: column; align-items: center; flex: 1; height: 100%; justify-content: flex-end; }
        .chart-bar { 
            width: 100%; background-color: #3a3a3a; border-radius: 4px; transition: height 0.5s ease; min-height: 4px; 
        }
        .chart-bar.active { background-color: var(--accent-color); box-shadow: 0 0 10px rgba(96, 205, 255, 0.2); }
        .chart-label { font-size: 10px; color: var(--text-secondary); margin-top: 6px; font-weight: 600; }

        /* --- Daily Progress Card --- */
        .progress-card { min-height: 280px; height: auto; flex-shrink: 0; } 
        
        .daily-edit-form { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--card-bg); z-index: 20; display: flex; flex-direction: column; gap: 15px; justify-content: center; padding: 24px; border-radius: var(--border-radius); }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 13px; color: var(--text-secondary); }
        .form-input { background: var(--input-bg); border: 1px solid var(--border-color); color: white; padding: 10px; border-radius: 8px; font-family: inherit; }
        .form-actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn-save { background: var(--accent-color); color:black; border:none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size:13px; font-weight: 600; flex:1;}
        .btn-cancel { background: #3a3a3a; color:white; border:none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size:13px; flex:1;}

        .stats-grid { display: flex; justify-content: center; align-items: center; margin-top: 25px; }
        .main-stat-circle { position: relative; width: 120px; height: 120px; }
        .daily-circle-bg { stroke: #3a3a3a; }
        .daily-circle-fill { stroke: #00d68f; stroke-dasharray: 282; stroke-dashoffset: 282; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
        
        .circle-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; }
        .circle-text .goal-num { font-size: 26px; font-weight: 400; }
        .circle-text .goal-unit { font-size: 13px; color: var(--text-secondary); }
        .circle-text .goal-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 2px;}
        .completed-text { text-align: center; margin-top: 20px; font-size: 14px; }
        
        .hidden { display: none !important; }

        /* =============================================
           INSTALL MODAL STYLES
        ============================================= */
        .install-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 1000;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .install-modal {
            background: #2b2b2b;
            border-radius: 20px 20px 20px 20px;
            padding: 28px 24px 24px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .install-modal-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
        }
        .install-modal-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #60cdff22, #60cdff44);
            border: 1px solid #60cdff44;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--accent-color);
            flex-shrink: 0;
        }
        .install-modal-title { font-size: 17px; font-weight: 600; }
        .install-modal-sub { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

        .install-steps {
            list-style: none;
            margin-bottom: 22px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .install-step {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #353535;
            padding: 12px 14px;
            border-radius: 10px;
        }
        .step-number {
            width: 26px;
            height: 26px;
            background: var(--accent-color);
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .step-text { font-size: 14px; line-height: 1.4; }
        .step-text strong { color: var(--text-primary); }
        .step-text span { color: var(--text-secondary); }

        .step-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #444;
            border-radius: 6px;
            padding: 2px 6px;
            font-size: 13px;
            vertical-align: middle;
            margin: 0 2px;
        }

        .install-modal-close {
            width: 100%;
            background: #3a3a3a;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .install-modal-close:hover { background: #444; }

        /* Chrome-specific native install button */
        .btn-native-install {
            width: 100%;
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 13px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-native-install:hover { background: var(--accent-hover); }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- Left Column -->
        <div class="col-left">
            <!-- CARD 1: Focus Setup & Timer -->
            <div class="card focus-main">
                <div class="card-header" style="justify-content: center;">
                    <span id="header-title">Ready, set, focus!</span>
                </div>

                <!-- Setup View -->
                <div id="setup-view" class="setup-view">
                    <div class="setup-content-wrapper">
                        <p>Achieve your goals and get more done with focus sessions.</p>
                        
                        <div class="time-picker">
                            <input type="number" id="setup-time-input" class="time-input" value="30" min="1" max="240" onchange="updateSessionTime(this.value)">
                            <div class="time-unit">
                                <button class="spin-btn" onclick="adjustTime(5)"><i class="fa-solid fa-chevron-up"></i></button>
                                <span>mins</span>
                                <button class="spin-btn" onclick="adjustTime(-5)"><i class="fa-solid fa-chevron-down"></i></button>
                            </div>
                        </div>

                        <button class="btn-primary" onclick="startFocus()">
                            <i class="fa-solid fa-play"></i> Start focus session
                        </button>
                    </div>
                </div>

                <!-- Timer View -->
                <div id="timer-view" class="timer-view">
                    <div class="progress-ring-container">
                        <svg class="progress-ring" width="220" height="220">
                            <circle class="progress-ring__circle-bg" stroke-width="12" fill="transparent" r="100" cx="110" cy="110"/>
                            <circle class="progress-ring__circle" id="timer-ring" stroke-width="12" fill="transparent" r="100" cx="110" cy="110"/>
                        </svg>
                        <div class="timer-center-content">
                            <div class="timer-big-text" id="countdown-text">30:00</div>
                        </div>
                    </div>
                    <button class="stop-btn" onclick="stopFocus()">
                        <i class="fa-solid fa-stop"></i>
                    </button>
                </div>
            </div>

            <!-- CARD 2: Tasks -->
            <div class="card tasks-card">
                <div class="card-header">
                    <span><i class="fa-solid fa-check" style="color:#60cdff; margin-right:8px"></i> Tasks</span>
                    <div>
                        <button class="icon-btn" onclick="toggleTaskInput()"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
                
                <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 5px;" id="task-header-text">Select a task for your session</p>

                <div class="task-input-container" id="task-input-container">
                    <input type="text" id="new-task-input" class="task-input" placeholder="Add a task...">
                    <button class="add-task-btn" onclick="addTask()"><i class="fa-solid fa-plus"></i></button>
                </div>

                <ul class="task-list" id="task-list">
                    <!-- Tasks injected here -->
                </ul>
            </div>
        </div>

        <!-- Right Column -->
        <div class="col-right">
            <!-- CARD 3: Daily Progress -->
            <div class="card progress-card">
                <div class="card-header">
                    <span>Daily progress</span>
                    <div>
                        <!-- Install Button — always visible, shows guide on click -->
                        <button id="install-btn" class="icon-btn install-pulse" title="Add to Home Screen" onclick="showInstallModal()">
                            <i class="fa-solid fa-download"></i>
                        </button>
                        <button class="icon-btn" onclick="toggleDailyEdit()"><i class="fa-solid fa-pen"></i></button>
                    </div>
                </div>
                
                <div id="daily-stats-view">
                    <div class="stats-grid">
                        <div class="main-stat-circle">
                            <svg width="120" height="120" style="transform: rotate(-90deg)">
                                <circle class="daily-circle-bg" stroke-width="8" fill="transparent" r="45" cx="60" cy="60"/>
                                <circle class="daily-circle-fill" id="daily-ring" stroke-width="8" fill="transparent" r="45" cx="60" cy="60"/>
                            </svg>
                            <div class="circle-text">
                                <span class="goal-label">Daily goal</span>
                                <span class="goal-num" id="daily-goal-display">1</span>
                                <span class="goal-unit">hour</span>
                            </div>
                        </div>
                    </div>
                    <div class="completed-text">Completed: <span id="completed-mins-text">0</span> minutes</div>
                </div>

                <div id="daily-edit-view" class="daily-edit-form hidden">
                    <div class="form-group">
                        <label>Daily Goal (Hours)</label>
                        <input type="number" id="edit-goal-input" class="form-input" value="1" min="1" max="24">
                    </div>
                    <div class="form-group">
                        <label>Reset time</label>
                        <input type="time" id="edit-reset-time" class="form-input" value="00:00">
                    </div>
                    <div class="form-actions">
                        <button class="btn-save" onclick="saveDailySettings()">Save Settings</button>
                        <button class="btn-cancel" onclick="toggleDailyEdit()">Cancel</button>
                    </div>
                </div>
            </div>

            <!-- CARD 4: Daily Checking & History -->
            <div class="card habits-card">
                <div class="card-header">
                    <span>Daily Check-ins</span>
                    <button class="icon-btn" onclick="toggleHabitInput()"><i class="fa-solid fa-plus"></i></button>
                </div>

                <div class="task-input-container" id="habit-input-container">
                    <input type="text" id="new-habit-input" class="task-input" placeholder="Add a habit...">
                    <button class="add-task-btn" onclick="addHabit()"><i class="fa-solid fa-plus"></i></button>
                </div>

                <ul class="habits-list" id="habits-list">
                    <!-- Injected via JS -->
                </ul>

                <div class="chart-container">
                    <div class="chart-title">Weekly Focus Activity (Minutes)</div>
                    <div class="bar-chart" id="weekly-chart">
                        <!-- Bars injected via JS -->
                    </div>
                </div>
            </div>

        </div>

    </div>

    <!-- =============================================
         INSTALL MODAL
    ============================================= -->
    <div id="install-modal" class="install-modal-overlay hidden" onclick="handleModalOverlayClick(event)">
        <div class="install-modal">
            <div class="install-modal-header">
                <div class="install-modal-icon">
                    <i class="fa-solid fa-mobile-screen"></i>
                </div>
                <div>
                    <div class="install-modal-title">Add to Home Screen</div>
                    <div class="install-modal-sub">Install Focus Session as an app</div>
                </div>
            </div>

            <!-- Native Chrome install button (shown only when PWA prompt is available) -->
            <button id="native-install-btn" class="btn-native-install hidden" onclick="triggerNativeInstall()">
                <i class="fa-solid fa-download"></i> Install App
            </button>

            <!-- Step-by-step guide (shown based on detected browser/OS) -->
            <ul class="install-steps" id="install-steps">
                <!-- Injected by JS -->
            </ul>

            <button class="install-modal-close" onclick="hideInstallModal()">Got it</button>
        </div>
    </div>

    <script>
        /* =========================================================
           PWA INSTALL LOGIC
        ========================================================= */
        let deferredPrompt = null;

        // Listen for Chrome's native install prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Show "Install App" button in modal when available
            document.getElementById('native-install-btn').classList.remove('hidden');
        });

        window.addEventListener('appinstalled', () => {
            deferredPrompt = null;
            document.getElementById('install-btn').classList.add('hidden');
        });

        // Register a minimal Service Worker (required for Chrome PWA)
        if ('serviceWorker' in navigator && window.location.protocol === 'https:') {
            const swCode = `
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => self.clients.claim());
                self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => new Response('Offline'))));
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(console.warn);
        }

        function detectBrowser() {
            const ua = navigator.userAgent;
            const isIOS = /iPad|iPhone|iPod/.test(ua);
            const isSafari = /Safari/.test(ua) && !/Chrome/.test(ua);
            const isChrome = /Chrome/.test(ua) && !/Edg/.test(ua);
            const isEdge = /Edg/.test(ua);
            const isFirefox = /Firefox/.test(ua);
            const isAndroid = /Android/.test(ua);

            if (isIOS && isSafari) return 'ios-safari';
            if (isIOS && isChrome) return 'ios-chrome';
            if (isIOS) return 'ios-other';
            if (isAndroid && isChrome) return 'android-chrome';
            if (isAndroid && isFirefox) return 'android-firefox';
            if (isEdge) return 'edge';
            if (isChrome) return 'chrome-desktop';
            return 'other';
        }

        function getInstallSteps(browser) {
            const steps = {
                'ios-safari': [
                    { icon: 'fa-arrow-up-from-bracket', text: 'Tap the <strong>Share</strong> button <span class="step-icon"><i class="fa-solid fa-arrow-up-from-bracket"></i></span> at the bottom of your screen' },
                    { icon: 'fa-plus-square', text: 'Scroll down and tap <strong>"Add to Home Screen"</strong>' },
                    { icon: 'fa-check', text: 'Tap <strong>"Add"</strong> in the top-right corner' },
                ],
                'ios-chrome': [
                    { icon: 'fa-ellipsis', text: 'Tap the <strong>three-dot menu</strong> <span class="step-icon">⋮</span> in the top-right corner' },
                    { icon: 'fa-plus-square', text: 'Tap <strong>"Add to Home Screen"</strong>' },
                    { icon: 'fa-check', text: 'Tap <strong>"Add"</strong> to confirm' },
                ],
                'android-chrome': [
                    { icon: 'fa-ellipsis-vertical', text: 'Tap the <strong>three-dot menu</strong> <span class="step-icon">⋮</span> at the top-right' },
                    { icon: 'fa-plus-square', text: 'Tap <strong>"Add to Home screen"</strong> or <strong>"Install app"</strong>' },
                    { icon: 'fa-check', text: 'Tap <strong>"Add"</strong> or <strong>"Install"</strong> to confirm' },
                ],
                'android-firefox': [
                    { icon: 'fa-ellipsis-vertical', text: 'Tap the <strong>three-dot menu</strong> at the top-right' },
                    { icon: 'fa-plus-square', text: 'Tap <strong>"Install"</strong>' },
                    { icon: 'fa-check', text: 'Tap <strong>"Add"</strong> to confirm' },
                ],
                'edge': [
                    { icon: 'fa-ellipsis', text: 'Click the <strong>three-dot menu</strong> <span class="step-icon">…</span> in the top-right' },
                    { icon: 'fa-plus-square', text: 'Click <strong>"Apps"</strong> → <strong>"Install this site as an app"</strong>' },
                    { icon: 'fa-check', text: 'Click <strong>"Install"</strong> to confirm' },
                ],
                'chrome-desktop': [
                    { icon: 'fa-arrow-up-right-from-square', text: 'Look for the <strong>install icon</strong> <span class="step-icon"><i class="fa-solid fa-arrow-up-right-from-square" style="font-size:11px"></i></span> in the address bar' },
                    { icon: 'fa-check', text: 'Click it and select <strong>"Install"</strong>' },
                ],
                'other': [
                    { icon: 'fa-ellipsis', text: 'Open your <strong>browser menu</strong> (usually three dots or lines)' },
                    { icon: 'fa-plus-square', text: 'Look for <strong>"Add to Home Screen"</strong> or <strong>"Install App"</strong>' },
                    { icon: 'fa-check', text: 'Confirm to install the app' },
                ],
            };
            return steps[browser] || steps['other'];
        }

        function showInstallModal() {
            const modal = document.getElementById('install-modal');
            modal.classList.remove('hidden');

            const browser = detectBrowser();
            const steps = getInstallSteps(browser);
            const stepsEl = document.getElementById('install-steps');

            stepsEl.innerHTML = steps.map((step, i) => `
                <li class="install-step">
                    <div class="step-number">${i + 1}</div>
                    <div class="step-text">${step.text}</div>
                </li>
            `).join('');

            // If native prompt is available, show it but also keep manual steps visible
            if (deferredPrompt) {
                document.getElementById('native-install-btn').classList.remove('hidden');
            }
        }

        function hideInstallModal() {
            document.getElementById('install-modal').classList.add('hidden');
        }

        function handleModalOverlayClick(e) {
            if (e.target === document.getElementById('install-modal')) hideInstallModal();
        }

        async function triggerNativeInstall() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    hideInstallModal();
                    document.getElementById('install-btn').classList.add('hidden');
                }
                deferredPrompt = null;
                document.getElementById('native-install-btn').classList.add('hidden');
            }
        }

        /* =========================================================
           APP LOGIC & STORAGE
        ========================================================= */
        const KEYS = {
            STATS: 'focusApp_stats',
            TASKS: 'focusApp_tasks',
            HABITS: 'focusApp_habits',
            HISTORY: 'focusApp_history' 
        };

        let stats = JSON.parse(localStorage.getItem(KEYS.STATS)) || { dailyMinutes: 0, goalHours: 1, resetTime: "00:00", lastResetTimestamp: Date.now() };
        let tasks = JSON.parse(localStorage.getItem(KEYS.TASKS)) || [];
        let habits = JSON.parse(localStorage.getItem(KEYS.HABITS)) || [];
        let historyData = JSON.parse(localStorage.getItem(KEYS.HISTORY)) || {};

        function getRecentResetPoint(resetTimeStr) {
            const now = new Date();
            const [h, m] = resetTimeStr.split(':').map(Number);
            const targetToday = new Date(now);
            targetToday.setHours(h, m, 0, 0);
            if (now >= targetToday) return targetToday.getTime();
            const targetYesterday = new Date(now);
            targetYesterday.setDate(targetYesterday.getDate() - 1);
            targetYesterday.setHours(h, m, 0, 0);
            return targetYesterday.getTime();
        }

        function checkDailyReset() {
            const recentResetPoint = getRecentResetPoint(stats.resetTime);
            if (stats.lastResetTimestamp < recentResetPoint) {
                stats.dailyMinutes = 0;
                stats.lastResetTimestamp = Date.now(); 
                habits.forEach(h => h.done = false);
                saveHabits();
                saveStats();
                renderHabits();
                updateDailyUI();
            }
        }

        function saveStats() { localStorage.setItem(KEYS.STATS, JSON.stringify(stats)); }
        function saveTasks() { localStorage.setItem(KEYS.TASKS, JSON.stringify(tasks)); }
        function saveHabits() { localStorage.setItem(KEYS.HABITS, JSON.stringify(habits)); }
        function saveHistory() { localStorage.setItem(KEYS.HISTORY, JSON.stringify(historyData)); }
        function getTodayString() { return new Date().toLocaleDateString('en-CA'); }

        checkDailyReset();
        
        const completedMinsText = document.getElementById('completed-mins-text');
        const dailyGoalDisplay = document.getElementById('daily-goal-display');
        const editGoalInput = document.getElementById('edit-goal-input');
        const editResetTimeInput = document.getElementById('edit-reset-time');

        function renderGraph() {
            const container = document.getElementById('weekly-chart');
            container.innerHTML = '';
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const today = new Date();
            const last7Days = [];
            for(let i=6; i>=0; i--) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                const dateStr = d.toLocaleDateString('en-CA');
                const val = historyData[dateStr] || 0;
                last7Days.push({ label: days[d.getDay()], val: val, isToday: i===0 });
            }
            let maxVal = Math.max(...last7Days.map(d => d.val), 60);
            last7Days.forEach(day => {
                const heightPct = (day.val / maxVal) * 100;
                const col = document.createElement('div');
                col.className = 'chart-col';
                col.innerHTML = `
                    <div class="chart-bar ${day.isToday ? 'active' : ''}" style="height: ${heightPct}%;"></div>
                    <div class="chart-label">${day.label}</div>
                `;
                container.appendChild(col);
            });
        }

        const dailyRing = document.getElementById('daily-ring');
        const dailyRadius = 45;
        const dailyCircumference = 2 * Math.PI * dailyRadius;
        dailyRing.style.strokeDasharray = `${dailyCircumference} ${dailyCircumference}`;
        
        function updateDailyUI() {
            completedMinsText.innerText = stats.dailyMinutes;
            dailyGoalDisplay.innerText = stats.goalHours;
            editGoalInput.value = stats.goalHours;
            editResetTimeInput.value = stats.resetTime;
            const goalMinutes = stats.goalHours * 60;
            let percent = (stats.dailyMinutes / goalMinutes) * 100;
            if (percent > 100) percent = 100;
            const offset = dailyCircumference - (percent / 100) * dailyCircumference;
            dailyRing.style.strokeDashoffset = offset;
            renderGraph();
        }
        
        function incrementDailyProgress() {
            stats.dailyMinutes++;
            saveStats();
            const todayStr = getTodayString();
            if(!historyData[todayStr]) historyData[todayStr] = 0;
            historyData[todayStr]++;
            saveHistory();
            updateDailyUI();
        }

        updateDailyUI();

        const habitsListEl = document.getElementById('habits-list');
        const habitInputContainer = document.getElementById('habit-input-container');
        const newHabitInput = document.getElementById('new-habit-input');
        
        function toggleHabitInput() {
            if (habitInputContainer.style.display === 'flex') {
                habitInputContainer.style.display = 'none';
            } else {
                habitInputContainer.style.display = 'flex';
                newHabitInput.focus();
            }
        }

        function renderHabits() {
            habitsListEl.innerHTML = '';
            if(habits.length === 0) {
                habitsListEl.innerHTML = '<li style="color:#666; font-size:13px; text-align:center; margin-top:10px;">No daily habits added.</li>';
                return;
            }
            habits.forEach(h => {
                const li = document.createElement('li');
                li.className = 'habit-item';
                li.innerHTML = `
                    <div class="task-checkbox-area" onclick="toggleHabit(${h.id})">
                        <div class="custom-checkbox" style="${h.done ? 'background-color: var(--success-bg); border-color:var(--success-bg)' : ''}">
                            <i class="fa-solid fa-check" style="display: ${h.done ? 'block' : 'none'}"></i>
                        </div>
                    </div>
                    <div class="habit-text" style="${h.done ? 'text-decoration: line-through; opacity: 0.6' : ''}">${h.text}</div>
                    <button class="delete-task-btn" onclick="deleteHabit(${h.id})"><i class="fa-solid fa-xmark"></i></button>
                `;
                habitsListEl.appendChild(li);
            });
        }

        function toggleHabit(id) {
            const h = habits.find(x => x.id === id);
            if(h) h.done = !h.done;
            saveHabits();
            renderHabits();
        }

        function addHabit() {
            const text = newHabitInput.value.trim();
            if(text) {
                habits.push({ id: Date.now(), text: text, done: false });
                saveHabits();
                newHabitInput.value = '';
                habitInputContainer.style.display = 'none';
                renderHabits();
            }
        }
        newHabitInput.addEventListener('keypress', function (e) { if (e.key === 'Enter') addHabit(); });
        function deleteHabit(id) { habits = habits.filter(h => h.id !== id); saveHabits(); renderHabits(); }
        renderHabits();

        const dailyStatsView = document.getElementById('daily-stats-view');
        const dailyEditView = document.getElementById('daily-edit-view');
        function toggleDailyEdit() { dailyEditView.classList.toggle('hidden'); dailyStatsView.classList.toggle('hidden'); }
        function saveDailySettings() {
            const newGoal = parseInt(editGoalInput.value);
            const newReset = editResetTimeInput.value;
            if (newGoal && newGoal > 0) stats.goalHours = newGoal;
            if (newReset) stats.resetTime = newReset;
            saveStats();
            updateDailyUI();
            checkDailyReset();
            toggleDailyEdit();
        }

        const taskListEl = document.getElementById('task-list');
        const newTaskInput = document.getElementById('new-task-input');
        const taskInputContainer = document.getElementById('task-input-container');

        function toggleTaskInput() {
            if (taskInputContainer.style.display === 'flex') {
                taskInputContainer.style.display = 'none';
            } else {
                taskInputContainer.style.display = 'flex';
                newTaskInput.focus();
            }
        }
        function formatTimeSpent(seconds) { return `${Math.floor(seconds / 60)}m`; }

        function renderTasks() {
            taskListEl.innerHTML = '';
            if(tasks.length === 0) {
                taskListEl.innerHTML = '<li style="color:#666; font-size:13px; text-align:center; margin-top:10px;">No tasks yet. Click + to add.</li>';
                return;
            }
            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = `task-item ${task.selected ? 'selected' : ''} ${task.completed ? 'completed' : ''}`;
                li.id = `task-row-${task.id}`;
                li.innerHTML = `
                    <div class="task-checkbox-area" onclick="toggleComplete(event, ${task.id})">
                        <div class="custom-checkbox">
                            <i class="fa-solid fa-check"></i>
                        </div>
                    </div>
                    <div class="task-info" onclick="selectTask(${task.id})">
                        <h4>${task.text}</h4>
                        ${task.selected ? '<span><i class="fa-regular fa-clock"></i> Selected for session</span>' : '<span>Click to select</span>'}
                    </div>
                    <div class="task-time-spent" id="time-spent-${task.id}">${formatTimeSpent(task.timeSpentSeconds)}</div>
                    <button class="delete-task-btn" onclick="deleteTask(event, ${task.id})"><i class="fa-solid fa-xmark"></i></button>
                `;
                taskListEl.appendChild(li);
            });
        }
        function updateTaskTimeDisplay(taskId) {
            const task = tasks.find(t => t.id === taskId);
            const el = document.getElementById(`time-spent-${taskId}`);
            if (el && task) el.innerText = formatTimeSpent(task.timeSpentSeconds);
        }
        function addTask() {
            const text = newTaskInput.value.trim();
            if (text) {
                const newTask = { id: Date.now(), text: text, selected: false, completed: false, timeSpentSeconds: 0 };
                if(tasks.length === 0) newTask.selected = true;
                tasks.push(newTask);
                saveTasks();
                newTaskInput.value = '';
                taskInputContainer.style.display = 'none';
                renderTasks();
            }
        }
        newTaskInput.addEventListener('keypress', function (e) { if (e.key === 'Enter') addTask(); });
        function selectTask(id) {
            tasks.forEach(t => t.selected = false);
            const task = tasks.find(t => t.id === id);
            if (task) task.selected = true;
            saveTasks();
            renderTasks();
            if(timerInterval) document.getElementById('task-header-text').innerText = "You are focusing on";
        }
        function toggleComplete(e, id) { e.stopPropagation(); const t = tasks.find(t => t.id === id); if(t) { t.completed = !t.completed; saveTasks(); renderTasks(); } }
        function deleteTask(e, id) { e.stopPropagation(); tasks = tasks.filter(t => t.id !== id); saveTasks(); renderTasks(); }
        renderTasks();

        const setupView = document.getElementById('setup-view');
        const timerView = document.getElementById('timer-view');
        const setupTimeInput = document.getElementById('setup-time-input');
        const countdownText = document.getElementById('countdown-text');
        const timerRing = document.getElementById('timer-ring');
        const headerTitle = document.getElementById('header-title');
        
        let sessionMinutes = 30;
        let totalSeconds = 30 * 60;
        let remainingSeconds = 30 * 60;
        let timerInterval = null;
        let elapsedSecondsInSession = 0;

        const timerRadius = 100;
        const timerCircumference = 2 * Math.PI * timerRadius;
        timerRing.style.strokeDasharray = `${timerCircumference} ${timerCircumference}`;

        function updateSessionTime(val) {
            let num = parseInt(val);
            if(isNaN(num) || num < 1) num = 1;
            if(num > 240) num = 240;
            sessionMinutes = num;
            setupTimeInput.value = num; 
        }
        function adjustTime(amount) { updateSessionTime(parseInt(setupTimeInput.value) + amount); }

        function startFocus() {
            checkDailyReset(); 
            updateSessionTime(setupTimeInput.value);
            setupView.classList.add('hidden');
            timerView.style.display = 'flex';
            headerTitle.innerText = "Focus 1 of 1";
            const activeTask = tasks.find(t => t.selected);
            document.getElementById('task-header-text').innerText = activeTask ? `You are focusing on` : "Focusing without a specific task";
            totalSeconds = sessionMinutes * 60;
            remainingSeconds = totalSeconds;
            elapsedSecondsInSession = 0;
            timerRing.style.strokeDashoffset = 0;
            timerInterval = setInterval(() => {
                remainingSeconds--;
                elapsedSecondsInSession++;
                const m = Math.floor(remainingSeconds / 60);
                const s = remainingSeconds % 60;
                countdownText.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                const percentage = (remainingSeconds / totalSeconds) * 100;
                timerRing.style.strokeDashoffset = timerCircumference * ((100 - percentage) / 100);
                if (elapsedSecondsInSession > 0 && elapsedSecondsInSession % 60 === 0) incrementDailyProgress();
                if (activeTask && !activeTask.completed) {
                    activeTask.timeSpentSeconds++;
                    if (activeTask.timeSpentSeconds % 5 === 0) { 
                        saveTasks();
                        updateTaskTimeDisplay(activeTask.id);
                    }
                }
                if (remainingSeconds <= 0) {
                    clearInterval(timerInterval);
                    saveTasks();
                    alert("Focus session complete!");
                    stopFocus();
                }
            }, 1000);
        }

        function stopFocus() {
            clearInterval(timerInterval);
            timerView.style.display = 'none';
            setupView.classList.remove('hidden');
            headerTitle.innerText = "Ready, set, focus!";
            document.getElementById('task-header-text').innerText = "Select a task for your session";
            renderTasks();
            saveTasks();
        }
    </script>
</body>
</html>
